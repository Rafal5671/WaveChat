events {
    worker_connections 4096;
}

http {
    upstream authservice {
        server authservice:8000;
    }

    upstream userservice {
        server userservice:8000;
    }

    upstream chatservice {
        server chatservice:8000;
    }

    upstream mediaservice {
        server mediaservice:8000;
    }

    upstream notificationservice {
        server notificationservice:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    server {
        listen 80;
        server_name _;

        client_max_body_size 210M;

        location ~ ^/api/auth/(login|register|verify) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://authservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://authservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://userservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/ {
            proxy_pass http://chatservice;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /api/chat/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://chatservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/media/ {
            proxy_pass http://mediaservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_request_buffering off;
        }

        location /api/notifications/ {
            proxy_pass http://notificationservice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        location /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 '{"status": "ok"}';
            add_header Content-Type application/json;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
